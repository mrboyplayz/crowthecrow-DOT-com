<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>greg</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}
#cookie{width:100vw;height:100vh;object-fit:contain;display:block;transform-origin:center center;will-change:transform}
.dance{animation:dance 0.7s ease-in-out infinite}
@keyframes dance{
  0%{transform:translateY(0) scale(1) rotate(0deg)}
  12%{transform:translateY(8px) scale(1.08,0.9) rotate(-4deg)}
  25%{transform:translateY(-24px) scale(0.98,1.08) rotate(6deg)}
  37%{transform:translateY(6px) scale(1.06,0.92) rotate(-3deg)}
  50%{transform:translateY(-18px) scale(0.96,1.12) rotate(4deg)}
  62%{transform:translateY(10px) scale(1.1,0.9) rotate(-6deg)}
  75%{transform:translateY(-10px) scale(0.98,1.06) rotate(5deg)}
  88%{transform:translateY(4px) scale(1.04,0.94) rotate(-2deg)}
  100%{transform:translateY(0) scale(1) rotate(0deg)}
}
</style>
</head>
<body>
<img id="cookie" src="/smlwiki/cookie.png" alt="cookie">
<script>
const cookie=document.getElementById("cookie");
const audio=new Audio("/smlwiki/dance.mp3");
audio.play().catch(()=>{});
setTimeout(()=>{cookie.classList.add("dance")},6000);
const target="https://www.youtube.com/watch?v=iTpc03s4U_E";
function finish(){
  window.location.href=target;
  setTimeout(()=>{window.close()},200);
}
audio.addEventListener("ended",finish);
setTimeout(finish,30000);
</script>
</body>
</html>
