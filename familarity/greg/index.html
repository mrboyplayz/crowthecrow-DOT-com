<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>greg</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}
#cookie{width:100vw;height:100vh;object-fit:contain;display:block;transform-origin:center center}
.dance{animation:squash 0.6s ease-in-out infinite}
@keyframes squash{
  0%{transform:scale(1)}
  25%{transform:scale(1.08,0.92)}
  50%{transform:scale(0.95,1.1)}
  75%{transform:scale(1.05,0.95)}
  100%{transform:scale(1)}
}
</style>
</head>
<body>
<img id="cookie" src="/smlwiki/cookie.png" alt="cookie">
<script>
const cookie=document.getElementById("cookie");
const audio=new Audio("/smlwiki/dance.mp3");
audio.play().catch(()=>{});
setTimeout(()=>{cookie.classList.add("dance")},6000);
const target="https://www.youtube.com/watch?v=iTpc03s4U_E";
function finish(){
  window.location.href=target;
  setTimeout(()=>{window.close()},200);
}
audio.addEventListener("ended",finish);
setTimeout(finish,30000);
</script>
</body>
</html>
