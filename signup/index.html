<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caw-board /signup</title>
<style>
body{margin:0;background:#1b1b1b;color:#e6e6e6;font-family:Tahoma,Arial,sans-serif}
#page{max-width:520px;margin:40px auto 60px;padding:0 12px}
.panel{background:#2a2a2a;border:2px inset #111;padding:12px}
.panel h3{margin:0 0 10px 0;font-size:16px;color:#ffd17a}
.label{font-size:12px;color:#bbb;margin-bottom:4px}
.input{width:100%;box-sizing:border-box;background:#111;color:#e6e6e6;border:1px solid #555;padding:6px;font-size:12px}
.btn{background:linear-gradient(#5e5e5e,#3a3a3a);color:#fff;border:1px solid #222;padding:6px 10px;font-size:12px;cursor:pointer}
.btn:active{transform:translateY(1px)}
.muted{color:#a7a7a7;font-size:11px}
.warn{color:#ffb3b3;font-size:12px}
.links{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.captcha-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:11900;display:flex;align-items:center;justify-content:center}
.captcha-modal{width:min(680px,94vw);max-height:90vh;overflow:auto;background:#161616;border:2px solid #ffd17a;padding:14px}
.captcha-title{font-size:15px;color:#ffd17a;text-align:center;margin-bottom:8px}
.captcha-image{max-width:min(360px,90%);display:block;margin:0 auto;border:1px solid #555;background:#000}
.captcha-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.quiz-choice{font-size:13px;border:0;padding:10px 8px;color:#fff;cursor:pointer;font-weight:700}
.quiz-choice.choice-red{background:#e21b3c}
.quiz-choice.choice-blue{background:#1368ce}
.quiz-choice.choice-yellow{background:#d89e00}
.quiz-choice.choice-green{background:#26890c}
.hidden{display:none}
</style></head>
<body>
<div id="page">
  <div class="panel">
    <h3>/signup</h3>
    <div class="warn" style="margin-bottom:8px">Use a completely different password from your usual passwords.</div>
    <div class="label">Username</div>
    <input id="signup-user" class="input" placeholder="username">
    <div class="label" style="margin-top:8px">Password</div>
    <input id="signup-pass" class="input" type="password" placeholder="password">
    <div class="label" style="margin-top:8px">Confirm password</div>
    <input id="signup-pass2" class="input" type="password" placeholder="confirm password">
    <div id="recaptcha-wrap" style="margin-top:10px"></div>
    <button id="signup-btn" class="btn" style="margin-top:10px">Create Account</button>
    <div id="status" class="muted" style="margin-top:8px"></div>
    <div class="links">
      <a class="btn" href="/login/">/login</a>
      <a class="btn" href="/caw-board/">/caw-board</a>
    </div>
  </div>
</div>
<script>
const qs=e=>document.querySelector(e);
const LS=localStorage;
const apiBase=(location.hostname==="crowthecrow.com"||location.hostname==="www.crowthecrow.com")?"https://crowthecrow-dot-com.vercel.app":"";
const apiUrl=apiBase?`${apiBase}/api/caw-board`:"/api/caw-board";
const KEY="caw_session_token";
const quizState={id:"",passToken:"",questionIndex:0,total:5};
const FAIL_VIDEO_URL="/caw-content/sonothalal.mp4";
const FAIL_REDIRECT_URL="https://zanryth.xyz/";
const QUIZ_AUDIO_URL="/caw-content/kaHOOT.mp3";
const CORRECT_AUDIO_URL="/caw-content/correct.mp3";
const QTE_KEYS=["q","w","e","a","s","d","z","x","c","j","k","l"];
const QTE_CHANCE=0.35;
let quizAudio=null;
let correctAudio=null;
let qteTimer=0;
let qteHandler=null;
function setStatus(text){const s=qs("#status");if(s)s.textContent=text||""}
async function apiPost(action,body){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  const resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});
  const data=await resp.json().catch(()=>null);
  if(!resp.ok)return data||{error:"http_error"};
  return data;
}
async function apiGet(action,params){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp=await fetch(url);
  if(!resp.ok)return null;
  return resp.json();
}
function setToken(token){
  if(token)LS.setItem(KEY,token);else LS.removeItem(KEY);
}
function signupError(error){
  if(error==="captcha_required"||error==="captcha_invalid"||error==="captcha_expired"||error==="captcha_wrong_answer")return "captcha failed";
  return "signup failed";
}
function ensureQuizAudio(){
  if(!quizAudio){
    quizAudio=new Audio(QUIZ_AUDIO_URL);
    quizAudio.loop=true;
  }
  quizAudio.play().catch(()=>{});
}
function stopQuizAudio(){
  if(!quizAudio)return;
  quizAudio.pause();
  quizAudio.currentTime=0;
}
function playCorrectSound(){
  if(!correctAudio)correctAudio=new Audio(CORRECT_AUDIO_URL);
  correctAudio.currentTime=0;
  correctAudio.play().catch(()=>{});
}
function ensureCaptchaModal(){
  let overlay=qs("#captcha-overlay");
  if(overlay)return overlay;
  overlay=document.createElement("div");
  overlay.id="captcha-overlay";
  overlay.className="captcha-overlay";
  overlay.innerHTML=`<div class="captcha-modal"><div id="captcha-modal-content"></div></div>`;
  document.body.appendChild(overlay);
  return overlay;
}
function showCaptchaModal(){
  const overlay=ensureCaptchaModal();
  overlay.classList.remove("hidden");
}
function hideCaptchaModal(){
  const overlay=qs("#captcha-overlay");
  if(overlay)overlay.remove();
}
function captchaModalContent(){
  ensureCaptchaModal();
  return qs("#captcha-modal-content");
}
function renderQuizStartPrompt(){
  stopQuizAudio();
  quizState.passToken="";
  showCaptchaModal();
  const wrap=captchaModalContent();
  if(!wrap)return;
  wrap.innerHTML=`<div class="captcha-title">Complete captcha to continue</div><button id="start-captcha-btn" class="btn" type="button" style="margin:4px auto 0;display:block">Begin Captcha</button>`;
  const btn=qs("#start-captcha-btn");
  if(btn)btn.onclick=startQuiz;
}
function clearQteOverlay(){
  if(qteTimer){clearTimeout(qteTimer);qteTimer=0;}
  if(qteHandler){window.removeEventListener("keydown",qteHandler);qteHandler=null;}
  const existing=qs("#qte-overlay");
  if(existing)existing.remove();
}
async function runQteIfNeeded(){
  if(Math.random()>QTE_CHANCE)return true;
  clearQteOverlay();
  const key=QTE_KEYS[Math.floor(Math.random()*QTE_KEYS.length)];
  const left=Math.floor(10+Math.random()*70);
  const top=Math.floor(10+Math.random()*70);
  const overlay=document.createElement("div");
  overlay.id="qte-overlay";
  overlay.style.cssText=`position:fixed;left:${left}vw;top:${top}vh;z-index:13000;background:#0b0b0b;border:2px solid #f5c95d;padding:10px;max-width:240px`;
  overlay.innerHTML=`<div class="label">QTE: press <b>${key.toUpperCase()}</b> in 4s</div>`;
  document.body.appendChild(overlay);
  return await new Promise(resolve=>{
    const done=value=>{clearQteOverlay();resolve(value);};
    qteHandler=e=>{
      if(String(e.key||"").toLowerCase()===key){done(true);}
    };
    window.addEventListener("keydown",qteHandler);
    qteTimer=setTimeout(()=>done(false),4000);
  });
}
function failAndBoot(){
  clearQteOverlay();
  stopQuizAudio();
  showCaptchaModal();
  const wrap=captchaModalContent();
  if(!wrap){location.href=FAIL_REDIRECT_URL;return}
  wrap.innerHTML=`<video id="fail-video" src="${FAIL_VIDEO_URL}" autoplay controls playsinline style="width:100%;max-width:360px;display:block;margin-top:8px"></video>`;
  setStatus("wrong answer");
  const video=qs("#fail-video");
  const go=()=>{location.href=FAIL_REDIRECT_URL};
  if(video){
    video.onended=go;
    video.play().catch(()=>{});
  }
  setTimeout(go,12000);
}
function renderQuiz(question){
  showCaptchaModal();
  const wrap=captchaModalContent();
  if(!question){wrap.textContent="captcha unavailable";return}
  quizState.id=question.quizId||"";
  quizState.questionIndex=Number(question.index||1);
  quizState.total=Number(question.total||5);
  const choices=Array.isArray(question.choices)?question.choices:[];
  wrap.innerHTML=`<div class="captcha-title">Question ${quizState.questionIndex}/${quizState.total}: ${question.prompt||""}</div><img id="quiz-image" class="captcha-image" src="${question.image||""}"><div id="quiz-choices" class="captcha-choices"></div><input id="quiz-answer" class="input" placeholder="${choices.length?"or type your own answer":"type answer"}" style="margin-top:8px"><button id="quiz-answer-btn" class="btn" type="button" style="margin-top:8px">Submit Answer</button>`;
  const input=qs("#quiz-answer");
  if(input)input.focus();
  const choicesWrap=qs("#quiz-choices");
  if(choicesWrap){
    if(!choices.length){
      choicesWrap.remove();
    }else{
      choices.forEach(choice=>{
        const btn=document.createElement("button");
        const palette=["choice-red","choice-blue","choice-yellow","choice-green"];
        const colorClass=palette[choicesWrap.children.length%palette.length];
        btn.className=`quiz-choice ${colorClass}`;
        btn.type="button";
        btn.textContent=String(choice||"");
        btn.onclick=()=>{
          if(input)input.value=String(choice||"");
          submitQuizAnswer();
        };
        choicesWrap.appendChild(btn);
      });
    }
  }
  const submit=qs("#quiz-answer-btn");
  if(submit)submit.onclick=submitQuizAnswer;
}
async function startQuiz(){
  quizState.passToken="";
  setStatus("");
  const data=await apiGet("quiz_start");
  if(!data||!data.ok){setStatus("captcha unavailable");return}
  renderQuiz(data);
  ensureQuizAudio();
}
async function submitQuizAnswer(){
  ensureQuizAudio();
  const qteOk=await runQteIfNeeded();
  if(!qteOk){failAndBoot();return}
  const answer=String(qs("#quiz-answer")?.value||"").trim();
  if(!quizState.id||!answer){setStatus("captcha answer required");return}
  const data=await apiPost("quiz_answer",{quizId:quizState.id,answer});
  if(data&&data.ok&&data.done&&data.passToken){
    playCorrectSound();
    stopQuizAudio();
    quizState.passToken=String(data.passToken);
    hideCaptchaModal();
    setStatus("captcha passed");
    return;
  }
  if(data&&data.ok&&!data.done){
    playCorrectSound();
    setStatus("");
    renderQuiz(data);
    return;
  }
  if(data&&data.error==="captcha_wrong_answer"){
    failAndBoot();
    return;
  }
  if(data&&data.error==="captcha_expired"){
    setStatus("captcha expired");
    renderQuizStartPrompt();
    return;
  }
  setStatus("captcha failed");
}
async function signup(){
  const u=qs("#signup-user").value.trim();
  const p=qs("#signup-pass").value;
  const p2=qs("#signup-pass2").value;
  if(!u||!p||p!==p2||u.length<3||p.length<6||!quizState.passToken){setStatus("invalid signup");return}
  setStatus("");
  const payload={username:u,password:p,captchaPassToken:quizState.passToken};
  const resp=await apiPost("signup",payload);
  if(!resp||!resp.token){
    setStatus(signupError(resp?.error));
    renderQuizStartPrompt();
    return;
  }
  setToken(resp.token);
  location.href="/caw-board/";
}
async function refreshSession(){
  const token=LS.getItem(KEY)||"";
  if(!token)return;
  const data=await apiPost("session",{token});
  if(data&&data.user){location.href="/caw-board/";}
}
qs("#signup-btn").onclick=signup;
refreshSession();
renderQuizStartPrompt();
</script>
</body></html>
