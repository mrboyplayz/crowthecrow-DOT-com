<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caw-board</title>
<style>
body{margin:0;background:#1b1b1b;color:#e6e6e6;font-family:Tahoma,Arial,sans-serif}
#page{max-width:1400px;margin:30px auto 60px;padding:0 12px}
.board-frame{width:100%;border:3px ridge #4a4a4a;background:#222}
.board-title{background:linear-gradient(#4b4b4b,#2c2c2c);padding:8px 12px;border-bottom:2px solid #111;font-size:20px;letter-spacing:.5px}
.board-sub{font-size:12px;color:#c0c0c0}
.sidebar{width:260px;vertical-align:top;background:#1f1f1f;border-right:2px solid #111;padding:12px}
.main{vertical-align:top;padding:12px}
.panel{background:#2a2a2a;border:2px inset #111;padding:8px;margin-bottom:10px}
.panel h3{margin:0 0 6px 0;font-size:14px;color:#ffd17a}
.label{font-size:12px;color:#bbb;margin-bottom:4px}
.input, .textarea, .select{width:100%;box-sizing:border-box;background:#111;color:#e6e6e6;border:1px solid #555;padding:6px;font-size:12px}
.textarea{min-height:70px;resize:vertical}
.btn{background:linear-gradient(#5e5e5e,#3a3a3a);color:#fff;border:1px solid #222;padding:6px 10px;font-size:12px;cursor:pointer}
.btn:active{transform:translateY(1px)}
.muted{color:#a7a7a7;font-size:11px}
.warn{color:#ffb3b3;font-size:12px}
#posts{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.post{background:#1e1e1e;border:2px solid #111;margin-bottom:12px}
.post-head{background:#2f2f2f;padding:6px 10px;border-bottom:1px solid #111}
.post-title{font-weight:700;color:#ffe3a3}
.post-meta{font-size:11px;color:#bdbdbd}
.post-body{padding:8px}
.post-media{max-width:100%;border:1px solid #333;background:#000;display:block;width:100%;height:auto;max-height:220px;object-fit:cover}
.post-link{color:#ffe3a3;text-decoration:none}
.post-link:hover{text-decoration:underline}
.post-actions{margin-top:6px}
.comment{background:#252525;border:1px solid #111;margin-top:6px;padding:6px}
.comment-meta{font-size:11px;color:#bdbdbd}
.comment-text{font-size:12px;color:#e8e8e8}
.admin-tag{color:#ffcc66;font-weight:700}
.users-list{max-height:220px;overflow:auto;white-space:pre-wrap}
.hidden{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.topbar-links{display:flex;gap:8px;flex-wrap:wrap}
</style></head>
<body>
<div id="page">
  <div class="panel topbar">
    <div class="board-title">Caw-board <span class="board-sub">/cb/ image + video board</span></div>
    <div id="auth-logged-out" class="topbar-links">
      <a class="btn" href="/login/">/login</a>
      <a class="btn" href="/signup/">/signup</a>
    </div>
    <div id="auth-logged-in" class="topbar-links hidden">
      <div class="label">Signed in as <span id="session-user"></span></div>
      <button id="logout-btn" class="btn">Sign Out</button>
    </div>
  </div>
  <table class="board-frame" cellpadding="0" cellspacing="0">
    <tr>
      <td class="sidebar">
        <div class="panel">
          <h3>Rules</h3>
          <div class="muted">no Porn buddy this is a meme image board send bullshit idk just dont make it porn looking at you GREG.</div>
        </div>
        <div id="verify-panel" class="panel hidden">
          <h3>Discord Verification</h3>
          <div class="muted">Verify to post and comment.</div>
          <button id="verify-btn" class="btn" style="margin-top:6px">Verify Discord</button>
          <div id="verify-status" class="muted" style="margin-top:6px"></div>
        </div>
        <div id="admin-panel" class="panel hidden">
          <h3>Admin</h3>
          <button id="wipe-btn" class="btn">Wipe All Posts</button>
          <div class="label" style="margin-top:8px">Users</div>
          <button id="load-users-btn" class="btn">Load Users</button>
          <div id="users-list" class="muted users-list"></div>
        </div>
      </td>
      <td class="main">
        <div class="panel">
          <h3>Create Post</h3>
          <div id="post-locked" class="muted">Sign in to post.</div>
          <div id="post-link" class="hidden">
            <a class="btn" href="/post/new/">Create New Post</a>
          </div>
          <div id="status" class="muted" style="margin-top:6px"></div>
        </div>
        <div id="posts"></div>
      </td>
    </tr>
  </table>
</div>
<script>
const qs=e=>document.querySelector(e);
const LS=localStorage;
const apiBase=(location.hostname==="crowthecrow.com"||location.hostname==="www.crowthecrow.com")?"https://crowthecrow-dot-com.vercel.app":"";
const apiUrl=apiBase?`${apiBase}/api/caw-board`:"/api/caw-board";
const KEYS={token:"caw_session_token"};
const state={posts:[],users:[],sessionUser:null,token:"",isAdmin:false,isVerified:false,discordName:""};
function fmtTime(ts){const d=new Date(ts);return d.toLocaleString()}
function setStatus(text){const s=qs("#status");if(s)s.textContent=text||""}
async function apiGet(action,params){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp=await fetch(url);
  if(!resp.ok)return null;
  return resp.json();
}
async function apiPost(action,body){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  const headers={"Content-Type":"application/json"};
  const resp=await fetch(url,{method:"POST",headers,body:JSON.stringify(body||{})});
  if(!resp.ok)return null;
  return resp.json();
}
function discordStartUrl(){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action","discord_start");
  url.searchParams.set("token",state.token);
  return url.toString();
}
function loadState(){
  state.token=LS.getItem(KEYS.token)||"";
}
function setToken(token){
  state.token=token||"";
  if(token)LS.setItem(KEYS.token,token);else LS.removeItem(KEYS.token);
}
function isAdmin(){return state.isAdmin}
function renderAuth(){
  const loggedIn=!!state.sessionUser;
  qs("#auth-logged-out").classList.toggle("hidden",loggedIn);
  qs("#auth-logged-in").classList.toggle("hidden",!loggedIn);
  qs("#session-user").textContent=state.sessionUser?`${state.sessionUser}${state.isAdmin?" (admin)":""}`:"";
  qs("#post-locked").classList.toggle("hidden",loggedIn&&state.isVerified);
  qs("#post-link").classList.toggle("hidden",!loggedIn||!state.isVerified);
  if(loggedIn&&!state.isVerified){
    qs("#post-locked").textContent="Verify Discord to post.";
  }else{
    qs("#post-locked").textContent="Sign in to post.";
  }
  qs("#admin-panel").classList.toggle("hidden",!state.isAdmin);
  if(!state.isAdmin){
    state.users=[];
    renderUsers();
  }
  renderVerify();
}
function renderVerify(){
  const show=!!state.sessionUser&&!state.isVerified;
  qs("#verify-panel").classList.toggle("hidden",!show);
  if(show){
    const label=state.discordName?`Connected: ${state.discordName}`:"Not verified";
    qs("#verify-status").textContent=label;
  }else{
    qs("#verify-status").textContent="";
  }
}
function renderUsers(){
  const listEl=qs("#users-list");
  if(!listEl)return;
  if(!state.isAdmin||!state.users.length){listEl.textContent="";return}
  listEl.innerHTML="";
  state.users.forEach(u=>{
    const row=document.createElement("div");
    const created=u.created?` • ${fmtTime(u.created)}`:"";
    const verified=u.verified?" • verified":" • unverified";
    const discord=u.discordId?` • ${u.discordId}`:"";
    const label=document.createElement("div");
    label.textContent=`${u.user}${created}${verified}${discord}`;
    const terminate=document.createElement("button");
    terminate.className="btn";
    terminate.textContent="Terminate";
    terminate.onclick=async()=>{
      if(!confirm(`Terminate ${u.user}?`))return;
      setStatus("");
      const ok=await apiPost("admin_delete_user",{token:state.token,username:u.user});
      if(!ok){setStatus("terminate failed");return}
      state.users=state.users.filter(x=>x.user!==u.user);
      renderUsers();
      setStatus(`terminated ${u.user}`);
    };
    row.append(label,terminate);
    listEl.appendChild(row);
  });
}
function extFromUrl(url){
  try{
    const parsed=new URL(url);
    const parts=parsed.pathname.split("/").filter(Boolean);
    const last=parts.length?parts[parts.length-1]:"";
    const dot=last.lastIndexOf(".");
    return dot>-1?last.slice(dot+1).toLowerCase():"";
  }catch{
    return "";
  }
}
function embedFromUrl(url){
  try{
    const parsed=new URL(url);
    const host=parsed.hostname.replace(/^www\./,"").toLowerCase();
    if(host==="youtu.be"){
      const id=parsed.pathname.split("/").filter(Boolean)[0];
      if(id)return `https://www.youtube-nocookie.com/embed/${id}`;
    }
    if(host==="youtube.com"){
      if(parsed.pathname==="/watch"){
        const id=parsed.searchParams.get("v");
        if(id)return `https://www.youtube-nocookie.com/embed/${id}`;
      }
      if(parsed.pathname.startsWith("/shorts/")){
        const id=parsed.pathname.split("/").filter(Boolean)[1];
        if(id)return `https://www.youtube-nocookie.com/embed/${id}`;
      }
      if(parsed.pathname.startsWith("/embed/")){
        return url;
      }
    }
    if(host==="vimeo.com"){
      const id=parsed.pathname.split("/").filter(Boolean)[0];
      if(id)return `https://player.vimeo.com/video/${id}`;
    }
  }catch{}
  return "";
}
function buildMedia(url,type){
  if(!url)return null;
  if(url.startsWith("data:")){
    return {kind:type==="video"?"video":"img",src:url};
  }
  const ext=extFromUrl(url);
  if(["jpg","jpeg","png","gif","webp","avif","bmp","svg"].includes(ext)){
    return {kind:"img",src:url};
  }
  if(["mp4","webm","ogg","mov","m4v"].includes(ext)){
    return {kind:"video",src:url};
  }
  const embed=embedFromUrl(url);
  if(embed){
    return {kind:"iframe",src:embed};
  }
  return {kind:type==="video"?"video":"img",src:url,fallback:true};
}
function renderMedia(body,post){
  const spec=buildMedia(post.url,post.type);
  if(!spec)return;
  if(spec.kind==="iframe"){
    const frame=document.createElement("iframe");
    frame.src=spec.src;
    frame.className="post-media";
    frame.setAttribute("allow","accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share");
    frame.setAttribute("allowfullscreen","true");
    body.appendChild(frame);
    return;
  }
  const media=document.createElement(spec.kind==="video"?"video":"img");
  media.className="post-media";
  media.src=spec.src;
  if(spec.kind==="video"){media.controls=true;media.preload="metadata"}else{media.loading="lazy";media.decoding="async"}
  body.appendChild(media);
  if(spec.fallback){
    const link=document.createElement("a");
    link.className="post-link";
    link.href=post.url;
    link.target="_blank";
    link.rel="noreferrer";
    link.textContent="Open link";
    body.appendChild(link);
  }
}
function renderPosts(){
  const postsEl=qs("#posts");
  postsEl.innerHTML="";
  const sorted=[...state.posts].sort((a,b)=>b.ts-a.ts);
  sorted.forEach(p=>{
    const wrap=document.createElement("div");
    wrap.className="post";
    const head=document.createElement("div");
    head.className="post-head";
    const safeTitle=p.title||"(untitled)";
    head.innerHTML=`<div class="post-title"><a class="post-link" href="/post/?id=${encodeURIComponent(p.id)}">${safeTitle}</a></div><div class="post-meta">by ${p.user} • ${fmtTime(p.ts)}</div>`;
    const body=document.createElement("div");
    body.className="post-body";
    renderMedia(body,p);
    let actions=null;
    const ensureActions=()=>{
      if(actions)return actions;
      actions=document.createElement("div");
      actions.className="post-actions";
      body.appendChild(actions);
      return actions;
    };
    if(state.sessionUser&&p.user===state.sessionUser){
      const delOwn=document.createElement("button");
      delOwn.className="btn";
      delOwn.textContent="Delete My Post";
      delOwn.onclick=async()=>{
        setStatus("");
        const ok=await apiPost("delete_post",{token:state.token,postId:p.id});
        if(!ok){setStatus("delete failed");return}
        await fetchPosts();
      };
      ensureActions().appendChild(delOwn);
    }
    if(isAdmin()){
      const del=document.createElement("button");
      del.className="btn";
      del.textContent="Delete Post";
      del.onclick=async()=>{
        setStatus("");
        const ok=await apiPost("admin_delete_post",{token:state.token,postId:p.id});
        if(!ok){setStatus("admin delete failed");return}
        await fetchPosts();
      };
      ensureActions().appendChild(del);
    }
    wrap.append(head,body);
    postsEl.appendChild(wrap);
  });
}
function logout(){
  setToken("");
  state.sessionUser=null;
  state.isAdmin=false;
  renderAuth();
  renderPosts();
}
async function adminWipe(){
  if(!state.isAdmin)return;
  if(!confirm("Wipe all posts?"))return;
  setStatus("");
  const ok=await apiPost("admin_wipe_posts",{token:state.token});
  if(!ok){setStatus("wipe failed");return}
  await fetchPosts();
}
async function adminLoadUsers(){
  if(!state.isAdmin)return;
  setStatus("");
  const data=await apiPost("admin_users",{token:state.token});
  if(!data||!Array.isArray(data.users)){setStatus("load users failed");return}
  state.users=data.users;
  renderUsers();
  setStatus(`loaded ${state.users.length} users`);
}
async function fetchPosts(){
  const data=await apiGet("posts");
  state.posts=Array.isArray(data?.posts)?data.posts:[];
  renderPosts();
}
async function refreshSession(){
  if(!state.token){state.sessionUser=null;renderAuth();return}
  const data=await apiPost("session",{token:state.token});
  if(!data||!data.user){
    setToken("");
    state.sessionUser=null;
    state.isAdmin=false;
    state.isVerified=false;
    state.discordName="";
  }else{
    state.sessionUser=data.user;
    state.isAdmin=!!data.admin;
    state.isVerified=!!data.verified||state.isAdmin;
    state.discordName=data.discordName||"";
  }
  renderAuth();
}
function wire(){
  qs("#logout-btn").onclick=logout;
  qs("#wipe-btn").onclick=adminWipe;
  qs("#load-users-btn").onclick=adminLoadUsers;
  qs("#verify-btn").onclick=()=>{
    if(!state.token)return;
    location.href=discordStartUrl();
  };
}
loadState();
wire();
refreshSession().then(fetchPosts);
</script>
</body></html>
