<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caw-board</title>
<style>
body{margin:0;background:linear-gradient(#232323,#151515);color:#e6e6e6;font-family:Tahoma,Arial,sans-serif}
body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 2px,transparent 2px,transparent 6px);pointer-events:none}
#page{max-width:1400px;margin:30px auto 60px;padding:0 12px}
.board-frame{width:100%;border:3px ridge #6a5a3a;background:#1c1a18;box-shadow:0 0 0 1px #0c0c0c,0 2px 8px rgba(0,0,0,.5)}
.board-title{background:linear-gradient(#6b5a3a,#3a2f1f);padding:8px 12px;border-bottom:2px solid #0f0d09;font-size:20px;letter-spacing:.5px;text-shadow:0 1px 0 #000}
.board-sub{font-size:12px;color:#d3c7a6}
.sidebar{width:260px;vertical-align:top;background:#1b1a18;border-right:2px solid #0f0d09;padding:12px}
.main{vertical-align:top;padding:12px}
.panel{background:linear-gradient(#2f2b24,#201c16);border:2px ridge #5f5238;padding:8px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.panel h3{margin:0 0 6px 0;font-size:14px;color:#ffd17a;text-shadow:0 1px 0 #000}
.label{font-size:12px;color:#bbb;margin-bottom:4px}
.input, .textarea, .select{width:100%;box-sizing:border-box;background:#0f0e0c;color:#e6e6e6;border:1px solid #6a5a3a;padding:6px;font-size:12px;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
.textarea{min-height:70px;resize:vertical}
.btn{background:linear-gradient(#7a6a4a,#4b3b26);color:#fff;border:1px solid #1b140c;padding:6px 10px;font-size:12px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 1px 0 rgba(0,0,0,.6)}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.muted{color:#a7a7a7;font-size:11px}
.warn{color:#ffb3b3;font-size:12px}
#posts{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.post{background:#1a1814;border:2px solid #0e0c09;margin-bottom:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.post-head{background:linear-gradient(#3a3328,#262018);padding:6px 10px;border-bottom:1px solid #0e0c09}
.post-title{font-weight:700;color:#ffe3a3}
.post-meta{font-size:11px;color:#bdbdbd}
.post-body{padding:8px}
.post-media{max-width:100%;border:1px solid #3d3424;background:#000;display:block;width:100%;height:auto;max-height:220px;object-fit:cover}
.post-link{color:#ffe3a3;text-decoration:none}
.post-link:hover{text-decoration:underline}
.post-actions{margin-top:6px}
.vote-bar{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.vote-btn{display:inline-flex;gap:4px;align-items:center}
.vote-icon{font-size:14px;line-height:1}
.vote-count{font-size:11px;color:#bdbdbd}
.comment{background:#221e18;border:1px solid #0f0d09;margin-top:6px;padding:6px}
.comment-meta{font-size:11px;color:#bdbdbd}
.comment-text{font-size:12px;color:#e8e8e8}
.admin-tag{color:#ffcc66;font-weight:700}
.users-list{max-height:220px;overflow:auto;white-space:pre-wrap}
.user-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.user-name{flex:1}
.pager{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.pager .btn{padding:4px 8px}
.pager .btn[aria-current="page"]{background:linear-gradient(#7a6a4a,#5a4a2a)}
.hidden{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.topbar-links{display:flex;gap:8px;flex-wrap:wrap}
.loading-overlay{position:fixed;inset:0;background:rgba(10,10,10,.78);display:flex;align-items:center;justify-content:center;z-index:12000}
.loading-box{display:flex;align-items:center;gap:12px;background:linear-gradient(#2f2b24,#201c16);border:2px ridge #5f5238;padding:14px 18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.loading-spin{width:56px;height:56px;animation:spin 1.05s linear infinite;image-rendering:auto}
.loading-text{font-size:20px;color:#ffd17a;letter-spacing:.8px;text-shadow:0 1px 0 #000;min-width:140px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style></head>
<body>
<div id="page">
  <div class="panel topbar"> 
    <div class="board-title">Caw-board <span class="board-sub">/cb/ image + video board</span></div>
    <div id="auth-logged-out" class="topbar-links">
      <a class="btn" href="/login/">/login</a>
      <a class="btn" href="/signup/">/signup</a>
    </div>
    <div id="auth-logged-in" class="topbar-links hidden">
      <div class="label">Signed in as <span id="session-user"></span></div>
      <button id="logout-btn" class="btn">Sign Out</button>
    </div>
  </div>
  <table class="board-frame" cellpadding="0" cellspacing="0">
    <tr>
      <td class="sidebar">
        <div class="panel">
          <h3>Rules</h3>
          <div class="muted">no Porn buddy this is a meme image board send bullshit idk just dont make it porn looking at you GREG.</div>
        </div>
        <div id="admin-panel" class="panel hidden">
          <h3>Admin</h3>
          <button id="wipe-btn" class="btn">Wipe All Posts</button>
          <button id="wipe-no-post-users-btn" class="btn" style="margin-top:6px">Wipe Users Without Posts</button>
          <div class="label" style="margin-top:8px">Users</div>
          <button id="load-users-btn" class="btn">Load Users</button>
          <div id="users-list" class="muted users-list"></div>
        </div>
      </td>
      <td class="main">
        <div class="panel">
          <h3>Create Post</h3>
          <div id="post-locked" class="muted">Sign in to post.</div>
          <div id="post-link" class="hidden">
            <a class="btn" href="/post/new/">Create New Post</a>
          </div>
          <div id="status" class="muted" style="margin-top:6px"></div>
        </div>
        <div id="posts"></div>
        <div id="pager" class="pager"></div>
      </td>
    </tr>
  </table>
</div>
<div id="loading-overlay" class="loading-overlay">
  <div class="loading-box">
    <img class="loading-spin" src="/pluv/pluv.png" alt="loading">
    <div id="loading-text" class="loading-text">LOADING.</div>
  </div>
</div>
<script>
const qs=e=>document.querySelector(e);
const LS=localStorage;
const apiBase=(location.hostname==="crowthecrow.com"||location.hostname==="www.crowthecrow.com")?"https://crowthecrow-dot-com.vercel.app":"";
const apiUrl=apiBase?`${apiBase}/api/caw-board`:"/api/caw-board";
const KEYS={token:"caw_session_token"};
const CAW_BOARD_CLOSED=false;
const state={posts:[],users:[],sessionUser:null,token:"",isAdmin:false,page:1};
const PAGE_SIZE=24;
let loadingTimer=0;
function fmtTime(ts){const d=new Date(ts);return d.toLocaleString()}
function mediaTag(post){
  const mime=String(post?.mime||"").toLowerCase();
  if(mime.startsWith("video/"))return "video";
  if(mime.startsWith("image/"))return "img";
  return post?.type==="video"?"video":"img";
}
function setStatus(text){const s=qs("#status");if(s)s.textContent=text||""}
function showLoading(){
  const overlay=qs("#loading-overlay");
  const textEl=qs("#loading-text");
  if(!overlay||!textEl)return;
  overlay.classList.remove("hidden");
  let step=0;
  textEl.textContent="LOADING.";
  if(loadingTimer)clearInterval(loadingTimer);
  loadingTimer=setInterval(()=>{
    step=(step+1)%3;
    textEl.textContent=`LOADING${".".repeat(step+1)}`;
  },420);
}
function hideLoading(){
  if(loadingTimer){clearInterval(loadingTimer);loadingTimer=0;}
  const overlay=qs("#loading-overlay");
  if(overlay)overlay.classList.add("hidden");
}
async function apiGet(action,params){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp=await fetch(url);
  if(!resp.ok)return null;
  return resp.json();
}
async function apiPost(action,body){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  const headers={"Content-Type":"application/json"};
  const resp=await fetch(url,{method:"POST",headers,body:JSON.stringify(body||{})});
  if(!resp.ok)return null;
  return resp.json();
}
function loadState(){
  state.token=LS.getItem(KEYS.token)||"";
}
function setToken(token){
  state.token=token||"";
  if(token)LS.setItem(KEYS.token,token);else LS.removeItem(KEYS.token);
}
function isAdmin(){return state.isAdmin}
function renderAuth(){
  const loggedIn=!!state.sessionUser;
  qs("#auth-logged-out").classList.toggle("hidden",loggedIn);
  qs("#auth-logged-in").classList.toggle("hidden",!loggedIn);
  qs("#session-user").textContent=state.sessionUser?`${state.sessionUser}${state.isAdmin?" (admin)":""}`:"";
  qs("#post-locked").classList.toggle("hidden",loggedIn);
  qs("#post-link").classList.toggle("hidden",!loggedIn);
  qs("#admin-panel").classList.toggle("hidden",!state.isAdmin);
  if(!state.isAdmin){
    state.users=[];
    renderUsers();
  }
}
function renderUsers(){
  const listEl=qs("#users-list");
  if(!listEl)return;
  listEl.innerHTML="";
  if(!state.isAdmin||!state.users.length)return;
  state.users.forEach(u=>{
    const row=document.createElement("div");
    row.className="user-row";
    const name=document.createElement("div");
    name.className="user-name";
    const created=u.created?` • ${fmtTime(u.created)}`:"";
    name.textContent=`${u.user}${created}`;
    const btn=document.createElement("button");
    btn.className="btn";
    btn.textContent="Terminate";
    if(u.user===state.sessionUser){
      btn.disabled=true;
      btn.textContent="Current";
    }
    btn.onclick=async()=>{
      if(btn.disabled)return;
      if(!confirm(`Terminate ${u.user}?`))return;
      setStatus("");
      const resp=await apiPost("admin_delete_user",{token:state.token,username:u.user});
      if(!resp||!resp.ok){setStatus("terminate failed");return}
      state.users=state.users.filter(item=>item.user!==u.user);
      renderUsers();
      await fetchPosts();
      setStatus(`terminated ${u.user}`);
    };
    row.append(name,btn);
    listEl.appendChild(row);
  });
}
function renderPosts(){
  const postsEl=qs("#posts");
  postsEl.innerHTML="";
  const sorted=[...state.posts].sort((a,b)=>b.ts-a.ts);
  const totalPages=Math.max(1,Math.ceil(sorted.length/PAGE_SIZE));
  if(state.page>totalPages)state.page=totalPages;
  const start=(state.page-1)*PAGE_SIZE;
  const pageItems=sorted.slice(start,start+PAGE_SIZE);
  pageItems.forEach(p=>{
    const wrap=document.createElement("div");
    wrap.className="post";
    const head=document.createElement("div");
    head.className="post-head";
    const safeTitle=p.title||"(untitled)";
    head.innerHTML=`<div class="post-title"><a class="post-link" href="/post/?id=${encodeURIComponent(p.id)}">${safeTitle}</a></div><div class="post-meta">by ${p.user} • ${fmtTime(p.ts)}</div>`;
    const body=document.createElement("div");
    body.className="post-body";
    const media=document.createElement(mediaTag(p));
    media.className="post-media";
    media.src=p.url;
    if(mediaTag(p)==="video"){media.controls=true;media.preload="metadata"}else{media.loading="lazy";media.decoding="async"}
    body.appendChild(media);
    let actions=null;
    const ensureActions=()=>{
      if(actions)return actions;
      actions=document.createElement("div");
      actions.className="post-actions";
      body.appendChild(actions);
      return actions;
    };
    if(state.sessionUser&&p.user===state.sessionUser){
      const delOwn=document.createElement("button");
      delOwn.className="btn";
      delOwn.textContent="Delete My Post";
      delOwn.onclick=async()=>{
        setStatus("");
        const ok=await apiPost("delete_post",{token:state.token,postId:p.id});
        if(!ok){setStatus("delete failed");return}
        await fetchPosts();
      };
      ensureActions().appendChild(delOwn);
    }
    if(isAdmin()){
      const del=document.createElement("button");
      del.className="btn";
      del.textContent="Delete Post";
      del.onclick=async()=>{
        setStatus("");
        const ok=await apiPost("admin_delete_post",{token:state.token,postId:p.id});
        if(!ok){setStatus("admin delete failed");return}
        await fetchPosts();
      };
      ensureActions().appendChild(del);
    }
    const votes=document.createElement("div");
    votes.className="vote-bar";
    const likeBtn=document.createElement("button");
    likeBtn.className="btn vote-btn";
    likeBtn.innerHTML=`<span class="vote-icon">👍</span><span class="vote-count">${Number(p.likes||0)}</span>`;
    likeBtn.onclick=async()=>{
      if(!state.token){setStatus("sign in to vote");return}
      const prevLikes=Number(p.likes||0);
      const prevDislikes=Number(p.dislikes||0);
      p.likes=prevLikes+1;
      likeBtn.querySelector(".vote-count").textContent=String(p.likes);
      const resp=await apiPost("vote",{token:state.token,postId:p.id,value:1});
      if(!resp||!resp.ok){
        p.likes=prevLikes;
        p.dislikes=prevDislikes;
        likeBtn.querySelector(".vote-count").textContent=String(p.likes);
        dislikeBtn.querySelector(".vote-count").textContent=String(p.dislikes);
        setStatus("vote failed");
        return;
      }
      p.likes=Number(resp.likes||0);
      p.dislikes=Number(resp.dislikes||0);
      likeBtn.querySelector(".vote-count").textContent=String(p.likes);
      dislikeBtn.querySelector(".vote-count").textContent=String(p.dislikes);
    };
    const dislikeBtn=document.createElement("button");
    dislikeBtn.className="btn vote-btn";
    dislikeBtn.innerHTML=`<span class="vote-icon">👎</span><span class="vote-count">${Number(p.dislikes||0)}</span>`;
    dislikeBtn.onclick=async()=>{
      if(!state.token){setStatus("sign in to vote");return}
      const prevLikes=Number(p.likes||0);
      const prevDislikes=Number(p.dislikes||0);
      p.dislikes=prevDislikes+1;
      dislikeBtn.querySelector(".vote-count").textContent=String(p.dislikes);
      const resp=await apiPost("vote",{token:state.token,postId:p.id,value:-1});
      if(!resp||!resp.ok){
        p.likes=prevLikes;
        p.dislikes=prevDislikes;
        likeBtn.querySelector(".vote-count").textContent=String(p.likes);
        dislikeBtn.querySelector(".vote-count").textContent=String(p.dislikes);
        setStatus("vote failed");
        return;
      }
      p.likes=Number(resp.likes||0);
      p.dislikes=Number(resp.dislikes||0);
      likeBtn.querySelector(".vote-count").textContent=String(p.likes);
      dislikeBtn.querySelector(".vote-count").textContent=String(p.dislikes);
    };
    votes.append(likeBtn,dislikeBtn);
    body.appendChild(votes);
    wrap.append(head,body);
    postsEl.appendChild(wrap);
  });
  renderPager(totalPages);
}
function renderPager(totalPages){
  const pager=qs("#pager");
  if(!pager)return;
  pager.innerHTML="";
  if(totalPages<=1)return;
  const addBtn=(label,page,disabled=false,current=false)=>{
    const btn=document.createElement("button");
    btn.className="btn";
    btn.textContent=label;
    if(disabled)btn.disabled=true;
    if(current)btn.setAttribute("aria-current","page");
    btn.onclick=()=>{
      if(disabled||page===state.page)return;
      state.page=page;
      renderPosts();
    };
    pager.appendChild(btn);
  };
  addBtn("←",Math.max(1,state.page-1),state.page<=1);
  const pages=[];
  if(totalPages<=7){
    for(let i=1;i<=totalPages;i++)pages.push(i);
  }else{
    pages.push(1);
    let start=Math.max(2,state.page-1);
    let end=Math.min(totalPages-1,state.page+1);
    if(start>2)pages.push("…");
    for(let i=start;i<=end;i++)pages.push(i);
    if(end<totalPages-1)pages.push("…");
    pages.push(totalPages);
  }
  pages.forEach(p=>{
    if(p==="…"){
      const span=document.createElement("span");
      span.className="muted";
      span.textContent="…";
      pager.appendChild(span);
      return;
    }
    addBtn(String(p),p,false,p===state.page);
  });
  addBtn("→",Math.min(totalPages,state.page+1),state.page>=totalPages);
}
function logout(){
  setToken("");
  state.sessionUser=null;
  state.isAdmin=false;
  renderAuth();
  renderPosts();
}
async function adminWipe(){
  if(!state.isAdmin)return;
  if(!confirm("Wipe all posts?"))return;
  setStatus("");
  const ok=await apiPost("admin_wipe_posts",{token:state.token});
  if(!ok){setStatus("wipe failed");return}
  await fetchPosts();
}
async function adminWipeUsersWithoutPosts(){
  if(!state.isAdmin)return;
  if(!confirm("Wipe every user without posts?"))return;
  setStatus("");
  const resp=await apiPost("admin_wipe_users_without_posts",{token:state.token});
  if(!resp||!resp.ok){setStatus("user wipe failed");return}
  await fetchPosts();
  setStatus(`removed ${Number(resp.removedUsers||0)} users`);
  if(state.users.length){
    await adminLoadUsers();
  }
}
async function adminLoadUsers(){
  if(!state.isAdmin)return;
  setStatus("");
  const data=await apiPost("admin_users",{token:state.token});
  if(!data||!Array.isArray(data.users)){setStatus("load users failed");return}
  state.users=data.users;
  renderUsers();
  setStatus(`loaded ${state.users.length} users`);
}
async function fetchPosts(){
  const data=await apiGet("posts");
  state.posts=Array.isArray(data?.posts)?data.posts:[];
  state.page=1;
  renderPosts();
}
async function refreshSession(){
  if(!state.token){state.sessionUser=null;renderAuth();return}
  const data=await apiPost("session",{token:state.token});
  if(!data||!data.user){setToken("");state.sessionUser=null;state.isAdmin=false}else{state.sessionUser=data.user;state.isAdmin=!!data.admin}
  renderAuth();
}
function wire(){
  qs("#logout-btn").onclick=logout;
  qs("#wipe-btn").onclick=adminWipe;
  qs("#wipe-no-post-users-btn").onclick=adminWipeUsersWithoutPosts;
  qs("#load-users-btn").onclick=adminLoadUsers;
}
if(CAW_BOARD_CLOSED){
  qs("#page").innerHTML=`<div class="panel"><h3>Caw-board Closed</h3><div class="muted">Caw-board is currently closed.</div></div>`;
}else{
  loadState();
  wire();
  showLoading();
  Promise.resolve()
    .then(refreshSession)
    .then(fetchPosts)
    .finally(hideLoading);
}
</script>
</body></html>
