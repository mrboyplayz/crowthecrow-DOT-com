<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caw-board /post/new</title>
<style>
body{margin:0;background:#1b1b1b;color:#e6e6e6;font-family:Tahoma,Arial,sans-serif}
#page{max-width:560px;margin:40px auto 60px;padding:0 12px}
.panel{background:#2a2a2a;border:2px inset #111;padding:12px;margin-bottom:10px}
.panel h3{margin:0 0 10px 0;font-size:16px;color:#ffd17a}
.label{font-size:12px;color:#bbb;margin-bottom:4px}
.input,.select{width:100%;box-sizing:border-box;background:#111;color:#e6e6e6;border:1px solid #555;padding:6px;font-size:12px}
.btn{background:linear-gradient(#5e5e5e,#3a3a3a);color:#fff;border:1px solid #222;padding:6px 10px;font-size:12px;cursor:pointer}
.btn:active{transform:translateY(1px)}
.muted{color:#a7a7a7;font-size:11px}
.links{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.hidden{display:none}
.progress{width:100%;height:10px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row .select,.row .input{flex:1}
</style></head>
<body>
<div id="page">
  <div class="panel">
    <h3>/post/new</h3>
    <div id="post-locked" class="muted">Sign in to post.</div>
    <div id="post-form" class="hidden">
      <div class="label">Title</div>
      <input id="post-title" class="input" placeholder="title">
      <div class="label" style="margin-top:6px">Media file</div>
      <input id="post-file" class="input" type="file" accept="image/*,video/*">
      <div class="label" style="margin-top:6px">Or media URL</div>
      <input id="post-url" class="input" placeholder="https://...">
      <div class="label" style="margin-top:6px">Type</div>
      <select id="post-type" class="select">
        <option value="image">Image</option>
        <option value="video">Video</option>
      </select>
      <div class="label" style="margin-top:6px">Video compression</div>
      <div class="row">
        <label class="muted"><input id="compress-video" type="checkbox" checked> Compress</label>
        <select id="compress-width" class="select">
          <option value="640">640px</option>
          <option value="854">854px</option>
          <option value="1280">1280px</option>
        </select>
        <select id="compress-bitrate" class="select">
          <option value="500000">500kbps</option>
          <option value="800000" selected>800kbps</option>
          <option value="1200000">1200kbps</option>
        </select>
      </div>
      <button id="post-btn" class="btn" style="margin-top:8px">Post</button>
    </div>
    <div id="status" class="muted" style="margin-top:6px"></div>
    <progress id="upload-progress" class="progress hidden" max="100" value="0"></progress>
    <div class="links">
      <a class="btn" href="/login/">/login</a>
      <a class="btn" href="/caw-board/">/caw-board</a>
    </div>
  </div>
</div>
<script>
const qs=e=>document.querySelector(e);
const LS=localStorage;
const apiBase=(location.hostname==="crowthecrow.com"||location.hostname==="www.crowthecrow.com")?"https://crowthecrow-dot-com.vercel.app":"";
const apiUrl=apiBase?`${apiBase}/api/caw-board`:"/api/caw-board";
const KEY="caw_session_token";
const state={token:""};
const MAX_UPLOAD=30*1024*1024;
const MAX_VERCEL_UPLOAD=4*1024*1024;
const bunnyConfig={pull:"",uploadEndpoint:""};
function setStatus(text){const s=qs("#status");if(s)s.textContent=text||""}
function showProgress(value){
  const el=qs("#upload-progress");
  if(!el)return;
  el.classList.remove("hidden");
  if(value==null){el.removeAttribute("value")}else{el.value=value}
}
function hideProgress(){
  const el=qs("#upload-progress");
  if(!el)return;
  el.classList.add("hidden");
  el.value=0;
}
async function apiPost(action,body,timeoutMs=30000){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),timeoutMs);
  try{
    const resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{}),signal:controller.signal});
    if(!resp.ok)return null;
    return resp.json();
  }catch{
    return null;
  }finally{
    clearTimeout(timer);
  }
}
function loadState(){
  state.token=LS.getItem(KEY)||"";
}
async function loadBunnyConfig(){
  try{
    const url=new URL(apiUrl,location.origin);
    url.searchParams.set("action","bunny_config");
    const resp=await fetch(url.toString(),{method:"GET"});
    if(!resp.ok)return;
    const data=await resp.json();
    bunnyConfig.pull=String(data?.pull||"").trim();
    bunnyConfig.uploadEndpoint=String(data?.uploadEndpoint||"").trim();
  }catch{}
}
async function uploadToBunnyEndpoint(file){
  if(!bunnyConfig.uploadEndpoint)return null;
  return new Promise(resolve=>{
    const endpoint=new URL(bunnyConfig.uploadEndpoint,location.origin);
    endpoint.searchParams.set("filename",encodeURIComponent(file.name||"upload.bin"));
    endpoint.searchParams.set("type",file.type||"application/octet-stream");
    const xhr=new XMLHttpRequest();
    xhr.open("POST",endpoint.toString(),true);
    xhr.setRequestHeader("Content-Type",file.type||"application/octet-stream");
    xhr.upload.onprogress=e=>{
      if(e.lengthComputable){
        const pct=Math.max(0,Math.min(100,Math.round((e.loaded/e.total)*100)));
        showProgress(pct);
      }else{
        showProgress(null);
      }
    };
    xhr.onload=()=>{
      if(xhr.status<200||xhr.status>=300){return resolve(null)}
      let data=null;
      try{data=JSON.parse(xhr.responseText||"")}catch{data=null}
      if(data?.url)return resolve(String(data.url));
      if(data?.path&&bunnyConfig.pull){
        const pull=bunnyConfig.pull.replace(/^https?:\/\//,"").replace(/\/+$/,"");
        const path=String(data.path).replace(/^\/+/,"");
        return resolve(`https://${pull}/${path}`);
      }
      return resolve(null);
    };
    xhr.onerror=()=>resolve(null);
    xhr.send(file);
  });
}
function supportsCompression(){
  return typeof MediaRecorder!=="undefined"&&typeof HTMLCanvasElement!=="undefined";
}
async function compressVideo(file,maxWidth,bitrate){
  return new Promise(resolve=>{
    if(!supportsCompression())return resolve(null);
    const video=document.createElement("video");
    video.muted=true;
    video.playsInline=true;
    const url=URL.createObjectURL(file);
    video.src=url;
    video.onloadedmetadata=()=>{
      const scale=Math.min(1,maxWidth/Math.max(1,video.videoWidth));
      const width=Math.max(1,Math.round(video.videoWidth*scale));
      const height=Math.max(1,Math.round(video.videoHeight*scale));
      const canvas=document.createElement("canvas");
      canvas.width=width;
      canvas.height=height;
      const ctx=canvas.getContext("2d");
      if(!ctx){URL.revokeObjectURL(url);return resolve(null)}
      const stream=canvas.captureStream(30);
      const types=["video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
      const mime=types.find(t=>MediaRecorder.isTypeSupported(t))||"";
      let recorder;
      try{
        recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:bitrate});
      }catch{
        URL.revokeObjectURL(url);
        return resolve(null);
      }
      const chunks=[];
      recorder.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data)};
      recorder.onstop=()=>{
        URL.revokeObjectURL(url);
        resolve(new Blob(chunks,{type:mime||"video/webm"}));
      };
      let rafId=0;
      const draw=()=>{
        if(video.paused||video.ended){return}
        ctx.drawImage(video,0,0,width,height);
        rafId=requestAnimationFrame(draw);
      };
      video.onended=()=>{
        cancelAnimationFrame(rafId);
        recorder.stop();
      };
      recorder.start();
      video.play().then(draw).catch(()=>{
        cancelAnimationFrame(rafId);
        try{recorder.stop()}catch{}
      });
    };
    video.onerror=()=>{
      URL.revokeObjectURL(url);
      resolve(null);
    };
  });
}
async function refreshSession(){
  if(!state.token){qs("#post-locked").classList.remove("hidden");return}
  qs("#post-locked").classList.add("hidden");
  qs("#post-form").classList.remove("hidden");
  const data=await apiPost("session",{token:state.token});
  if(!data||!data.user){
    LS.removeItem(KEY);
    qs("#post-form").classList.add("hidden");
    qs("#post-locked").classList.remove("hidden");
    setStatus("session expired");
    return;
  }
}
async function postFromFile(file,type,title){
  if(file.size>MAX_UPLOAD){setStatus("file too big, use a URL");return}
  const shouldCompress=type==="video"&&qs("#compress-video").checked;
  let uploadFile=file;
  if(shouldCompress){
    if(!supportsCompression()){setStatus("compression not supported, use a URL");return}
    const maxWidth=parseInt(qs("#compress-width").value,10)||640;
    const bitrate=parseInt(qs("#compress-bitrate").value,10)||800000;
    setStatus("compressing...");
    showProgress(0);
    const blob=await compressVideo(file,maxWidth,bitrate);
    if(!blob){setStatus("compression failed");hideProgress();return}
    uploadFile=new File([blob],file.name.replace(/\.[^/.]+$/,"")+".webm",{type:blob.type||"video/webm"});
  }
  if(bunnyConfig.uploadEndpoint){
    setStatus("uploading to storage...");
    showProgress(0);
    const url=await uploadToBunnyEndpoint(uploadFile);
    if(!url){setStatus("storage upload failed");hideProgress();return}
    const resp=await apiPost("create_post",{token:state.token,title,type,url},45000);
    const postId=resp?.post?.id||resp?.id||"";
    if(!resp||!postId){setStatus("post save failed");hideProgress();return}
    location.href=`/post/?id=${encodeURIComponent(postId)}`;
    return;
  }
  if(apiBase&&uploadFile.size>MAX_VERCEL_UPLOAD){setStatus("file too big for server upload, use a URL");return}
  const r=new FileReader();
  r.onloadstart=()=>{setStatus("reading file...");showProgress(0)};
  r.onprogress=e=>{
    if(e.lengthComputable){
      const pct=Math.max(0,Math.min(100,Math.round((e.loaded/e.total)*100)));
      showProgress(pct);
    }
  };
  r.onload=async()=>{
    setStatus("uploading...");
    showProgress(null);
    const resp=await apiPost("create_post",{token:state.token,title,type,url:r.result},45000);
    const postId=resp?.post?.id||resp?.id||"";
    if(!resp||!postId){setStatus("upload failed or timed out");hideProgress();return}
    location.href=`/post/?id=${encodeURIComponent(postId)}`;
  };
  r.onerror=()=>{setStatus("file read failed");hideProgress()};
  r.onloadend=()=>{if(qs("#upload-progress"))showProgress(100)};
  r.readAsDataURL(uploadFile);
}
async function postFromUrl(url,type,title){
  const resp=await apiPost("create_post",{token:state.token,title,type,url});
  const postId=resp?.post?.id||resp?.id||"";
  if(!resp||!postId){setStatus("post failed");return}
  location.href=`/post/?id=${encodeURIComponent(postId)}`;
}
function deriveTitle({title,file,url}){
  if(title)return title;
  if(file&&file.name){
    const base=file.name.replace(/\.[^/.]+$/,"");
    if(base)return base.slice(0,140);
  }
  if(url){
    try{
      const parsed=new URL(url);
      const parts=parsed.pathname.split("/").filter(Boolean);
      const last=parts.length?parts[parts.length-1]:parsed.hostname;
      return decodeURIComponent(last||"post").slice(0,140);
    }catch{
      return "post";
    }
  }
  return "post";
}
function postCreate(){
  const rawTitle=qs("#post-title").value.trim();
  const type=qs("#post-type").value;
  const url=qs("#post-url").value.trim();
  const file=qs("#post-file").files[0];
  setStatus("");
  const title=deriveTitle({title:rawTitle,file,url});
  if(file){postFromFile(file,type,title);return}
  if(url){postFromUrl(url,type,title);return}
  setStatus("add a file or url");
}
qs("#post-btn").onclick=postCreate;
loadState();
loadBunnyConfig().finally(refreshSession);
</script>
</body></html>
