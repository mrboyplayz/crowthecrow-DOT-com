<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caw-board /post/new</title>
<style>
body{margin:0;background:linear-gradient(#232323,#151515);color:#e6e6e6;font-family:Tahoma,Arial,sans-serif}
body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 2px,transparent 2px,transparent 6px);pointer-events:none}
#page{max-width:560px;margin:40px auto 60px;padding:0 12px}
.panel{background:linear-gradient(#2f2b24,#201c16);border:2px ridge #5f5238;padding:12px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.panel h3{margin:0 0 10px 0;font-size:16px;color:#ffd17a;text-shadow:0 1px 0 #000}
.label{font-size:12px;color:#bbb;margin-bottom:4px}
.input,.select{width:100%;box-sizing:border-box;background:#0f0e0c;color:#e6e6e6;border:1px solid #6a5a3a;padding:6px;font-size:12px;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
.btn{background:linear-gradient(#7a6a4a,#4b3b26);color:#fff;border:1px solid #1b140c;padding:6px 10px;font-size:12px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 1px 0 rgba(0,0,0,.6)}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.muted{color:#a7a7a7;font-size:11px}
.links{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.hidden{display:none}
.progress{width:100%;height:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row .select,.row .input{flex:1}
.preview{margin-top:8px;background:#1a1814;border:1px solid #0e0c09;padding:8px}
.preview-title{font-weight:700;color:#ffe3a3;margin-bottom:4px}
.preview-meta{font-size:11px;color:#bdbdbd;margin-bottom:6px}
.preview-desc{font-size:12px;color:#e0e0e0;white-space:pre-wrap;margin-top:6px}
.preview-media{max-width:100%;border:1px solid #3d3424;background:#000;display:block;width:100%;height:auto}
.captcha-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:11900;display:flex;align-items:center;justify-content:center}
.captcha-modal{width:min(560px,94vw);max-height:90vh;overflow:auto;background:#161616;border:2px solid #ffd17a;padding:14px}
.captcha-title{font-size:15px;color:#ffd17a;text-align:center;margin-bottom:8px}
.captcha-image{max-width:min(360px,90%);display:block;margin:0 auto;border:1px solid #555;background:#000}
.captcha-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.quiz-choice{font-size:13px;border:0;padding:10px 8px;color:#fff;cursor:pointer;font-weight:700}
.quiz-choice.choice-red{background:#e21b3c}
.quiz-choice.choice-blue{background:#1368ce}
.quiz-choice.choice-yellow{background:#d89e00}
.quiz-choice.choice-green{background:#26890c}
</style></head>
<body>
<div id="page">
  <div class="panel">
    <h3>/post/new</h3>
    <div class="muted" style="margin-bottom:8px">Rules: no Porn buddy this is a meme image board send bullshit idk just dont make it porn looking at you GREG.</div>
    <div id="post-locked" class="muted">Sign in to post.</div>
    <div id="post-form" class="hidden">
      <div class="label">Title</div>
      <input id="post-title" class="input" placeholder="title">
      <div class="label" style="margin-top:6px">Description</div>
      <textarea id="post-desc" class="input" rows="4" placeholder="add a description"></textarea>
      <div class="label" style="margin-top:6px">Media file</div>
      <div class="row">
        <input id="post-file" class="input" type="file" accept="image/*,video/*">
        <button id="clear-file" class="btn" type="button">Clear file</button>
      </div>
      <div class="label" style="margin-top:6px">Or media URL (use for large videos)</div>
      <input id="post-url" class="input" placeholder="https://...">
      <div id="post-preview" class="preview hidden"></div>
      <div class="label" style="margin-top:6px">Type</div>
      <select id="post-type" class="select">
        <option value="image">Image</option>
        <option value="video">Video</option>
      </select>
      <div id="recaptcha-wrap" style="margin-top:8px"></div>
      <button id="post-btn" class="btn" style="margin-top:8px">Post</button>
    </div>
    <div id="status" class="muted" style="margin-top:6px"></div>
    <progress id="upload-progress" class="progress hidden" max="100" value="0"></progress>
    <div class="links">
      <a class="btn" href="/login/">/login</a>
      <a class="btn" href="/caw-board/">/caw-board</a>
    </div>
  </div>
</div>
<script>
const qs=e=>document.querySelector(e);
const LS=localStorage;
const apiBase=(location.hostname==="crowthecrow.com"||location.hostname==="www.crowthecrow.com")?"https://crowthecrow-dot-com.vercel.app":"";
const apiUrl=apiBase?`${apiBase}/api/caw-board`:"/api/caw-board";
const KEY="caw_session_token";
const CAW_BOARD_CLOSED=false;
const state={token:"",previewTimer:0,quizId:"",quizIndex:0,quizTotal:5,captchaPassToken:""};
const FAIL_VIDEO_URL="/caw-content/sonothalal.mp4";
const FAIL_REDIRECT_URL="https://zanryth.xyz/";
const QUIZ_AUDIO_URL="/caw-content/kaHOOT.mp3";
const CORRECT_AUDIO_URL="/caw-content/correct.mp3";
const QTE_KEYS=["q","w","e","a","s","d","z","x","c","j","k","l"];
const QTE_CHANCE=0.35;
let quizAudio=null;
let correctAudio=null;
let qteTimer=0;
let qteHandler=null;
const MAX_UPLOAD=4718592;
const MEDIA_MAX_CHARS=900000;
function setStatus(text){const s=qs("#status");if(s)s.textContent=text||""}
function showProgress(value){
  const el=qs("#upload-progress");
  if(!el)return;
  el.classList.remove("hidden");
  if(value==null){el.removeAttribute("value")}else{el.value=value}
}
function hideProgress(){
  const el=qs("#upload-progress");
  if(!el)return;
  el.classList.add("hidden");
  el.value=0;
}
async function apiPost(action,body,timeoutMs=30000){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),timeoutMs);
  try{
    const resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{}),signal:controller.signal});
    const data=await resp.json().catch(()=>null);
    if(!resp.ok)return data||{error:"http_error"};
    return data;
  }catch{
    return null;
  }finally{
    clearTimeout(timer);
  }
}
async function apiGet(action,params){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  try{
    const resp=await fetch(url);
    if(!resp.ok)return null;
    return resp.json();
  }catch{
    return null;
  }
}
function renderQuiz(question){
  showCaptchaModal();
  const wrap=captchaModalContent();
  if(!question){wrap.textContent="captcha unavailable";return}
  state.quizId=question.quizId||"";
  state.quizIndex=Number(question.index||1);
  state.quizTotal=Number(question.total||5);
  const choices=Array.isArray(question.choices)?question.choices:[];
  wrap.innerHTML=`<div class="captcha-title">Question ${state.quizIndex}/${state.quizTotal}: ${question.prompt||""}</div><img id="quiz-image" class="captcha-image" src="${question.image||""}"><div id="quiz-choices" class="captcha-choices"></div><input id="quiz-answer" class="input" placeholder="${choices.length?"or type your own answer":"type answer"}" style="margin-top:6px"><button id="quiz-answer-btn" class="btn" type="button" style="margin-top:6px">Submit Answer</button><div id="captcha-inline-status" class="muted" style="margin-top:6px"></div>`;
  const input=qs("#quiz-answer");
  if(input){
    input.focus();
    input.onkeydown=e=>{
      if(e.key==="Enter"){
        e.preventDefault();
        submitQuizAnswer();
      }
    };
  }
  const choicesWrap=qs("#quiz-choices");
  if(choicesWrap){
    if(!choices.length){
      choicesWrap.remove();
    }else{
      choices.forEach(choice=>{
        const btn=document.createElement("button");
        const palette=["choice-red","choice-blue","choice-yellow","choice-green"];
        const colorClass=palette[choicesWrap.children.length%palette.length];
        btn.className=`quiz-choice ${colorClass}`;
        btn.type="button";
        btn.textContent=String(choice||"");
        btn.onclick=()=>{
          if(input)input.value=String(choice||"");
          submitQuizAnswer();
        };
        choicesWrap.appendChild(btn);
      });
    }
  }
  const btn=qs("#quiz-answer-btn");
  if(btn)btn.onclick=submitQuizAnswer;
}
function ensureQuizAudio(){
  if(!quizAudio){
    quizAudio=new Audio(QUIZ_AUDIO_URL);
    quizAudio.loop=true;
  }
  quizAudio.play().catch(()=>{});
}
function playCorrectSound(){
  if(!correctAudio)correctAudio=new Audio(CORRECT_AUDIO_URL);
  correctAudio.currentTime=0;
  correctAudio.play().catch(()=>{});
}
function stopQuizAudio(){
  if(!quizAudio)return;
  quizAudio.pause();
  quizAudio.currentTime=0;
}
function ensureCaptchaModal(){
  let overlay=qs("#captcha-overlay");
  if(overlay)return overlay;
  overlay=document.createElement("div");
  overlay.id="captcha-overlay";
  overlay.className="captcha-overlay";
  overlay.innerHTML=`<div class="captcha-modal"><div id="captcha-modal-content"></div></div>`;
  document.body.appendChild(overlay);
  return overlay;
}
function showCaptchaModal(){
  const overlay=ensureCaptchaModal();
  overlay.classList.remove("hidden");
}
function hideCaptchaModal(){
  const overlay=qs("#captcha-overlay");
  if(overlay)overlay.remove();
}
function captchaModalContent(){
  ensureCaptchaModal();
  return qs("#captcha-modal-content");
}
function setCaptchaInlineStatus(text){
  const el=qs("#captcha-inline-status");
  if(el)el.textContent=String(text||"");
}
function renderQuizStartPrompt(){
  stopQuizAudio();
  state.captchaPassToken="";
  showCaptchaModal();
  const wrap=captchaModalContent();
  if(!wrap)return;
  wrap.innerHTML=`<div class="captcha-title">Complete captcha to continue</div><button id="start-captcha-btn" class="btn" type="button" style="margin:4px auto 0;display:block">Begin Captcha</button>`;
  const btn=qs("#start-captcha-btn");
  if(btn)btn.onclick=startQuiz;
}
function clearQteOverlay(){
  if(qteTimer){clearTimeout(qteTimer);qteTimer=0;}
  if(qteHandler){window.removeEventListener("keydown",qteHandler);qteHandler=null;}
  const existing=qs("#qte-overlay");
  if(existing)existing.remove();
}
async function runQteIfNeeded(){
  if(Math.random()>QTE_CHANCE)return true;
  clearQteOverlay();
  const key=QTE_KEYS[Math.floor(Math.random()*QTE_KEYS.length)];
  const left=Math.floor(10+Math.random()*70);
  const top=Math.floor(10+Math.random()*70);
  const overlay=document.createElement("div");
  overlay.id="qte-overlay";
  overlay.style.cssText=`position:fixed;left:${left}vw;top:${top}vh;z-index:13000;background:#0b0b0b;border:2px solid #f5c95d;padding:10px;max-width:240px`;
  overlay.innerHTML=`<div class="label">QTE: press <b>${key.toUpperCase()}</b> in 4s</div>`;
  document.body.appendChild(overlay);
  return await new Promise(resolve=>{
    const done=value=>{clearQteOverlay();resolve(value);};
    qteHandler=e=>{
      if(String(e.key||"").toLowerCase()===key){done(true);}
    };
    window.addEventListener("keydown",qteHandler);
    qteTimer=setTimeout(()=>done(false),4000);
  });
}
function failAndBoot(){
  clearQteOverlay();
  stopQuizAudio();
  showCaptchaModal();
  const wrap=captchaModalContent();
  if(!wrap){location.href=FAIL_REDIRECT_URL;return}
  wrap.innerHTML=`<video id="fail-video" src="${FAIL_VIDEO_URL}" autoplay controls playsinline style="width:100%;max-width:360px;display:block;margin:6px auto 0"></video>`;
  setStatus("wrong answer");
  const video=qs("#fail-video");
  const go=()=>{location.href=FAIL_REDIRECT_URL};
  if(video){
    video.onended=go;
    video.play().catch(()=>{});
  }
  setTimeout(go,12000);
}
async function startQuiz(){
  state.captchaPassToken="";
  setStatus("");
  const data=await apiGet("quiz_start");
  if(!data||!data.ok){setStatus("captcha unavailable");return}
  renderQuiz(data);
  ensureQuizAudio();
}
async function submitQuizAnswer(){
  ensureQuizAudio();
  const submitBtn=qs("#quiz-answer-btn");
  if(submitBtn)submitBtn.disabled=true;
  setCaptchaInlineStatus("checking...");
  const qteOk=await runQteIfNeeded();
  if(!qteOk){
    if(submitBtn)submitBtn.disabled=false;
    failAndBoot();
    return;
  }
  const answer=String(qs("#quiz-answer")?.value||"").trim();
  if(!state.quizId||!answer){
    if(submitBtn)submitBtn.disabled=false;
    setCaptchaInlineStatus("captcha answer required");
    setStatus("captcha answer required");
    return;
  }
  const data=await apiPost("quiz_answer",{quizId:state.quizId,answer});
  if(data&&data.ok&&data.done&&data.passToken){
    playCorrectSound();
    stopQuizAudio();
    clearQteOverlay();
    state.captchaPassToken=String(data.passToken);
    qs("#recaptcha-wrap").innerHTML="";
    hideCaptchaModal();
    setCaptchaInlineStatus("");
    setStatus("captcha passed");
    return;
  }
  if(data&&data.ok&&!data.done){
    playCorrectSound();
    if(submitBtn)submitBtn.disabled=false;
    setCaptchaInlineStatus("");
    setStatus("");
    renderQuiz(data);
    return;
  }
  if(data&&data.error==="captcha_wrong_answer"){
    if(submitBtn)submitBtn.disabled=false;
    failAndBoot();
    return;
  }
  if(data&&data.error==="captcha_expired"){
    if(submitBtn)submitBtn.disabled=false;
    setCaptchaInlineStatus("captcha expired");
    setStatus("captcha expired");
    renderQuizStartPrompt();
    return;
  }
  if(submitBtn)submitBtn.disabled=false;
  setCaptchaInlineStatus("captcha failed");
  setStatus("captcha failed");
}
function statusFromError(error){
  if(error==="payload_too_large")return "file too big for server upload, use URL";
  if(error==="kv_set_failed")return "post save failed (storage full, use URL)";
  if(error==="unauthorized")return "sign in to post";
  if(error==="captcha_required"||error==="captcha_invalid"||error==="captcha_expired"||error==="captcha_wrong_answer")return "captcha failed";
  return "post save failed";
}
function mediaTag(post){
  const mime=String(post?.mime||"").toLowerCase();
  if(mime.startsWith("video/"))return "video";
  if(mime.startsWith("image/"))return "img";
  return post?.type==="video"?"video":"img";
}
function loadState(){
  state.token=LS.getItem(KEY)||"";
}
function fileToDataUrl(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onerror=()=>resolve("");
    reader.onload=()=>resolve(typeof reader.result==="string"?reader.result:"");
    reader.readAsDataURL(file);
  });
}
async function refreshSession(){
  if(!state.token){qs("#post-locked").classList.remove("hidden");return}
  qs("#post-locked").classList.add("hidden");
  qs("#post-form").classList.remove("hidden");
  const data=await apiPost("session",{token:state.token});
  if(!data||!data.user){
    LS.removeItem(KEY);
    qs("#post-form").classList.add("hidden");
    qs("#post-locked").classList.remove("hidden");
    setStatus("session expired");
    return;
  }
}
async function postFromFile(file,type,title,description){
  if(!state.captchaPassToken){setStatus("captcha required");return}
  if(file.size>MAX_UPLOAD){setStatus("file too big for server upload, use URL");return}
  const estimatedChars=Math.ceil(file.size*4/3)+100;
  if(estimatedChars>MEDIA_MAX_CHARS){setStatus("file too big for server upload, use URL");return}
  const uploadFile=file;
  setStatus("preparing...");
  showProgress(null);
  const dataUrl=await fileToDataUrl(uploadFile);
  if(!dataUrl){setStatus("file read failed");hideProgress();return}
  setStatus("saving...");
  const payload={token:state.token,title,description,type,url:dataUrl,captchaPassToken:state.captchaPassToken};
  const resp=await apiPost("create_post",payload,45000);
  const postId=resp?.post?.id||resp?.id||"";
  if(!resp||resp.error||!postId){setStatus(statusFromError(resp?.error));hideProgress();renderQuizStartPrompt();return}
  location.href=`/post/?id=${encodeURIComponent(postId)}`;
}
async function postFromUrl(url,type,title,description){
  if(!state.captchaPassToken){setStatus("captcha required");return}
  const payload={token:state.token,title,description,type,url,captchaPassToken:state.captchaPassToken};
  const resp=await apiPost("create_post",payload);
  const postId=resp?.post?.id||resp?.id||"";
  if(!resp||resp.error||!postId){setStatus(statusFromError(resp?.error));renderQuizStartPrompt();return}
  location.href=`/post/?id=${encodeURIComponent(postId)}`;
}
function deriveTitle({title,file,url}){
  if(title)return title;
  if(file&&file.name){
    const base=file.name.replace(/\.[^/.]+$/,"");
    if(base)return base.slice(0,140);
  }
  if(url){
    try{
      const parsed=new URL(url);
      const parts=parsed.pathname.split("/").filter(Boolean);
      const last=parts.length?parts[parts.length-1]:parsed.hostname;
      return decodeURIComponent(last||"post").slice(0,140);
    }catch{
      return "post";
    }
  }
  return "post";
}
function extractPostId(value){
  const raw=String(value||"").trim();
  if(!raw)return "";
  try{
    const parsed=new URL(raw,location.origin);
    const idParam=parsed.searchParams.get("id");
    if(idParam)return idParam;
    const parts=parsed.pathname.split("/").filter(Boolean);
    if(parts[0]==="post"&&parts[1])return decodeURIComponent(parts[1]);
    return "";
  }catch{
    if(/^\d+$/.test(raw))return raw;
    return "";
  }
}
function clearPreview(){
  const wrap=qs("#post-preview");
  if(!wrap)return;
  wrap.classList.add("hidden");
  wrap.innerHTML="";
}
function renderPreview(post){
  const wrap=qs("#post-preview");
  if(!wrap)return;
  wrap.innerHTML="";
  wrap.classList.remove("hidden");
  const title=document.createElement("div");
  title.className="preview-title";
  title.textContent=post.title||"(untitled)";
  const meta=document.createElement("div");
  meta.className="preview-meta";
  meta.textContent=`by ${post.user||"anon"} • ${new Date(post.ts||0).toLocaleString()}`;
  const media=document.createElement(mediaTag(post));
  media.className="preview-media";
  media.src=post.url;
  if(mediaTag(post)==="video"){media.controls=true;media.preload="metadata"}else{media.loading="lazy";media.decoding="async"}
  wrap.append(title,meta,media);
  if(post.description){
    const desc=document.createElement("div");
    desc.className="preview-desc";
    desc.textContent=post.description;
    wrap.appendChild(desc);
  }
}
let previewToken=0;
async function refreshPreview(){
  const urlValue=qs("#post-url").value.trim();
  const id=extractPostId(urlValue);
  if(!id){clearPreview();return}
  const token=++previewToken;
  const data=await apiGet("post",{id});
  if(token!==previewToken)return;
  if(!data||!data.post){clearPreview();return}
  renderPreview(data.post);
}
function postCreate(){
  if(CAW_BOARD_CLOSED){setStatus("caw-board closed");return}
  const rawTitle=qs("#post-title").value.trim();
  const description=qs("#post-desc").value.trim();
  const selectedType=qs("#post-type").value;
  const url=qs("#post-url").value.trim();
  const file=qs("#post-file").files[0];
  const inferredType=file
    ? (String(file.type||"").toLowerCase().startsWith("video/")?"video":"image")
    : selectedType;
  const type=inferredType==="video"?"video":"image";
  setStatus("");
  const title=deriveTitle({title:rawTitle,file,url});
  if(file){postFromFile(file,type,title,description);return}
  if(url){postFromUrl(url,type,title,description);return}
  setStatus("add a file or url");
}
qs("#post-btn").onclick=postCreate;
qs("#clear-file").onclick=()=>{
  const input=qs("#post-file");
  if(input)input.value="";
  setStatus("");
};
qs("#post-url").addEventListener("input",()=>{
  clearTimeout(state.previewTimer);
  state.previewTimer=setTimeout(refreshPreview,250);
});
if(CAW_BOARD_CLOSED){
  qs("#post-form").classList.add("hidden");
  qs("#post-locked").classList.remove("hidden");
  qs("#post-locked").textContent="Caw-board is currently closed.";
  setStatus("posting disabled");
}else{
  loadState();
  refreshSession();
  renderQuizStartPrompt();
}
</script>
</body></html>
