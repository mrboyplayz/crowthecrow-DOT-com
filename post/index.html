<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caw-board /post</title>
<style>
body{margin:0;background:linear-gradient(#232323,#151515);color:#e6e6e6;font-family:Tahoma,Arial,sans-serif}
body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 2px,transparent 2px,transparent 6px);pointer-events:none}
#page{max-width:980px;margin:30px auto 60px;padding:0 12px}
.panel{background:linear-gradient(#2f2b24,#201c16);border:2px ridge #5f5238;padding:8px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.panel h3{margin:0 0 6px 0;font-size:14px;color:#ffd17a;text-shadow:0 1px 0 #000}
.label{font-size:12px;color:#bbb;margin-bottom:4px}
.input,.select{width:100%;box-sizing:border-box;background:#0f0e0c;color:#e6e6e6;border:1px solid #6a5a3a;padding:6px;font-size:12px;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
.btn{background:linear-gradient(#7a6a4a,#4b3b26);color:#fff;border:1px solid #1b140c;padding:6px 10px;font-size:12px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 1px 0 rgba(0,0,0,.6)}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.muted{color:#a7a7a7;font-size:11px}
.warn{color:#ffb3b3;font-size:12px}
.hidden{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.topbar-links{display:flex;gap:8px;flex-wrap:wrap}
.board-title{background:linear-gradient(#6b5a3a,#3a2f1f);padding:8px 12px;border-bottom:2px solid #0f0d09;font-size:20px;letter-spacing:.5px;text-shadow:0 1px 0 #000}
.board-sub{font-size:12px;color:#d3c7a6}
#posts{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.post{background:#1a1814;border:2px solid #0e0c09;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.post-head{background:linear-gradient(#3a3328,#262018);padding:6px 10px;border-bottom:1px solid #0e0c09}
.post-title{font-weight:700;color:#ffe3a3}
.post-meta{font-size:11px;color:#bdbdbd}
.post-body{padding:10px}
.post-media{max-width:100%;border:1px solid #3d3424;background:#000;display:block;width:100%;height:auto}
#post-view .post-media{width:auto;max-height:70vh;object-fit:contain;margin:0 auto}
.post-desc{margin-top:8px;font-size:12px;color:#e0e0e0;white-space:pre-wrap}
.post-link{color:#ffe3a3;text-decoration:none}
.post-link:hover{text-decoration:underline}
.post-actions{margin-top:6px}
.vote-bar{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.vote-btn{display:inline-flex;gap:6px;align-items:center;padding:8px 12px;font-size:14px}
#post-view .vote-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.vote-label{font-size:11px;color:#d8cba6;line-height:1.1;text-align:center}
.vote-icon{font-size:14px;line-height:1}
.vote-count{font-size:11px;color:#bdbdbd}
#post-view .vote-bar{justify-content:center}
.vote-img{width:48px;height:48px;display:block}
.comment{background:#221e18;border:1px solid #0f0d09;margin-top:6px;padding:6px}
.comment-meta{font-size:11px;color:#bdbdbd}
.comment-text{font-size:12px;color:#e8e8e8}
.pager{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.pager .btn{padding:4px 8px}
.pager .btn[aria-current="page"]{background:linear-gradient(#7a6a4a,#5a4a2a)}
</style></head>
<body>
<div id="page">
  <div class="panel topbar">
    <div class="board-title">Caw-board <span class="board-sub">/post</span></div>
    <div id="auth-logged-out" class="topbar-links">
      <a class="btn" href="/login/">/login</a>
      <a class="btn" href="/signup/">/signup</a>
    </div>
    <div id="auth-logged-in" class="topbar-links hidden">
      <div class="label">Signed in as <span id="session-user"></span></div>
      <button id="logout-btn" class="btn">Sign Out</button>
    </div>
  </div>
  <div class="panel">
    <div class="topbar-links">
      <a class="btn" href="/caw-board/">/caw-board</a>
      <a class="btn" href="/post/new/">/post/new</a>
    </div>
    <div id="status" class="muted" style="margin-top:6px"></div>
  </div>
  <div id="post-view" class="hidden"></div>
  <div id="post-list" class="hidden">
    <div id="posts"></div>
    <div id="pager" class="pager"></div>
  </div>
</div>
<script>
const qs=e=>document.querySelector(e);
const LS=localStorage;
const apiBase=(location.hostname==="crowthecrow.com"||location.hostname==="www.crowthecrow.com")?"https://crowthecrow-dot-com.vercel.app":"";
const apiUrl=apiBase?`${apiBase}/api/caw-board`:"/api/caw-board";
const postBase=apiBase||location.origin;
const KEYS={token:"caw_session_token"};
const CAW_BOARD_CLOSED=false;
const state={token:"",sessionUser:null,isAdmin:false,post:null,posts:[],page:1};
const PAGE_SIZE=24;
const pathParts=location.pathname.split("/").filter(Boolean);
const queryId=new URLSearchParams(location.search).get("id")||"";
const hashId=(location.hash||"").replace(/^#/,"");
const postId=queryId||(pathParts[0]==="post"&&pathParts[1]?decodeURIComponent(pathParts[1]):"")||hashId;
function fmtTime(ts){const d=new Date(ts);return d.toLocaleString()}
function setStatus(text){const s=qs("#status");if(s)s.textContent=text||""}
function buildPostUrl(id){
  return `${postBase}/post/?id=${encodeURIComponent(id)}`;
}
async function copyText(value){
  try{
    await navigator.clipboard.writeText(value);
    return true;
  }catch{
    return false;
  }
}
async function apiGet(action,params){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  if(params)Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const resp=await fetch(url);
  if(!resp.ok)return null;
  return resp.json();
}
async function apiPost(action,body){
  const url=new URL(apiUrl,location.origin);
  url.searchParams.set("action",action);
  const headers={"Content-Type":"application/json"};
  const resp=await fetch(url,{method:"POST",headers,body:JSON.stringify(body||{})});
  if(!resp.ok)return null;
  return resp.json();
}
function loadState(){
  state.token=LS.getItem(KEYS.token)||"";
}
function setToken(token){
  state.token=token||"";
  if(token)LS.setItem(KEYS.token,token);else LS.removeItem(KEYS.token);
}
function renderAuth(){
  const loggedIn=!!state.sessionUser;
  qs("#auth-logged-out").classList.toggle("hidden",loggedIn);
  qs("#auth-logged-in").classList.toggle("hidden",!loggedIn);
  qs("#session-user").textContent=state.sessionUser?`${state.sessionUser}${state.isAdmin?" (admin)":""}`:"";
}
async function refreshSession(){
  if(!state.token){state.sessionUser=null;renderAuth();return}
  const data=await apiPost("session",{token:state.token});
  if(!data||!data.user){setToken("");state.sessionUser=null;state.isAdmin=false}else{state.sessionUser=data.user;state.isAdmin=!!data.admin}
  renderAuth();
}
function renderPost(){
  const post=state.post;
  const wrap=qs("#post-view");
  wrap.innerHTML="";
  if(!post){
    wrap.classList.remove("hidden");
    wrap.innerHTML=`<div class="panel"><div class="muted">Post not found.</div></div>`;
    return;
  }
  const panel=document.createElement("div");
  panel.className="post";
  const head=document.createElement("div");
  head.className="post-head";
  const safeTitle=post.title||"(untitled)";
  head.innerHTML=`<div class="post-title">${safeTitle}</div><div class="post-meta">by ${post.user} • ${fmtTime(post.ts)}</div>`;
  const body=document.createElement("div");
  body.className="post-body";
  const media=document.createElement(post.type==="video"?"video":"img");
  media.className="post-media";
  media.src=post.url;
  if(post.type==="video"){media.controls=true;media.preload="metadata"}else{media.loading="lazy";media.decoding="async"}
  body.appendChild(media);
  if(post.description){
    const desc=document.createElement("div");
    desc.className="post-desc";
    desc.textContent=post.description;
    body.appendChild(desc);
  }
  let actions=null;
  const ensureActions=()=>{
    if(actions)return actions;
    actions=document.createElement("div");
    actions.className="post-actions";
    body.appendChild(actions);
    return actions;
  };
  if(state.sessionUser&&post.user===state.sessionUser){
    const delOwn=document.createElement("button");
    delOwn.className="btn";
    delOwn.textContent="Delete My Post";
    delOwn.onclick=async()=>{
      setStatus("");
      const ok=await apiPost("delete_post",{token:state.token,postId:post.id});
      if(!ok){setStatus("delete failed");return}
      location.href="/post/";
    };
    ensureActions().appendChild(delOwn);
  }
  if(state.isAdmin){
    const del=document.createElement("button");
    del.className="btn";
    del.textContent="Delete Post";
    del.onclick=async()=>{
      setStatus("");
      const ok=await apiPost("admin_delete_post",{token:state.token,postId:post.id});
      if(!ok){setStatus("admin delete failed");return}
      location.href="/post/";
    };
    ensureActions().appendChild(del);
  }
  const votes=document.createElement("div");
  votes.className="vote-bar";
  let voteBusy=false;
  const setVoteBusy=value=>{
    voteBusy=value;
    likeBtn.disabled=value;
    dislikeBtn.disabled=value;
  };
  const likeWrap=document.createElement("div");
  likeWrap.className="vote-item";
  const likeBtn=document.createElement("button");
  likeBtn.className="btn vote-btn";
  likeBtn.innerHTML=`<img class="vote-img" src="/caw-content/thumbsup.png" alt="thumbs up"><span class="vote-count">${Number(post.likes||0)}</span>`;
  likeBtn.onclick=async()=>{
    if(!state.token){setStatus("sign in to vote");return}
    if(voteBusy)return;
    setVoteBusy(true);
    const prevLikes=Number(post.likes||0);
    const prevDislikes=Number(post.dislikes||0);
    post.likes=prevLikes+1;
    likeBtn.querySelector(".vote-count").textContent=String(post.likes);
    const resp=await apiPost("vote",{token:state.token,postId:post.id,value:1});
    if(!resp||!resp.ok){
      post.likes=prevLikes;
      post.dislikes=prevDislikes;
      likeBtn.querySelector(".vote-count").textContent=String(post.likes);
      dislikeBtn.querySelector(".vote-count").textContent=String(post.dislikes);
      setStatus("vote failed");
      setVoteBusy(false);
      return;
    }
    post.likes=Number(resp.likes||0);
    post.dislikes=Number(resp.dislikes||0);
    likeBtn.querySelector(".vote-count").textContent=String(post.likes);
    dislikeBtn.querySelector(".vote-count").textContent=String(post.dislikes);
    setVoteBusy(false);
  };
  const dislikeWrap=document.createElement("div");
  dislikeWrap.className="vote-item";
  const dislikeBtn=document.createElement("button");
  dislikeBtn.className="btn vote-btn";
  dislikeBtn.innerHTML=`<img class="vote-img" src="/caw-content/thumbsdown.png" alt="thumbs down"><span class="vote-count">${Number(post.dislikes||0)}</span>`;
  dislikeBtn.onclick=async()=>{
    if(!state.token){setStatus("sign in to vote");return}
    if(voteBusy)return;
    setVoteBusy(true);
    const prevLikes=Number(post.likes||0);
    const prevDislikes=Number(post.dislikes||0);
    post.dislikes=prevDislikes+1;
    dislikeBtn.querySelector(".vote-count").textContent=String(post.dislikes);
    const resp=await apiPost("vote",{token:state.token,postId:post.id,value:-1});
    if(!resp||!resp.ok){
      post.likes=prevLikes;
      post.dislikes=prevDislikes;
      likeBtn.querySelector(".vote-count").textContent=String(post.likes);
      dislikeBtn.querySelector(".vote-count").textContent=String(post.dislikes);
      setStatus("vote failed");
      setVoteBusy(false);
      return;
    }
    post.likes=Number(resp.likes||0);
    post.dislikes=Number(resp.dislikes||0);
    likeBtn.querySelector(".vote-count").textContent=String(post.likes);
    dislikeBtn.querySelector(".vote-count").textContent=String(post.dislikes);
    setVoteBusy(false);
  };
  const likeLabel=document.createElement("div");
  likeLabel.className="vote-label";
  likeLabel.textContent="this is amazing";
  const dislikeLabel=document.createElement("div");
  dislikeLabel.className="vote-label";
  dislikeLabel.textContent="this is shit";
  likeWrap.append(likeBtn,likeLabel);
  dislikeWrap.append(dislikeBtn,dislikeLabel);
  votes.append(likeWrap,dislikeWrap);
  body.appendChild(votes);
  const embed=document.createElement("button");
  embed.className="btn";
  embed.textContent="Copy Post Link";
  embed.onclick=async()=>{
    const url=buildPostUrl(post.id);
    const ok=await copyText(url);
    if(!ok){prompt("Post link",url);return}
    setStatus("post link copied");
  };
  ensureActions().appendChild(embed);
  const cwrap=document.createElement("div");
  const comments=Array.isArray(post.comments)?post.comments:[];
  comments.forEach(c=>{
    const cdiv=document.createElement("div");
    cdiv.className="comment";
    cdiv.innerHTML=`<div class="comment-meta">${c.user} • ${fmtTime(c.ts)}</div><div class="comment-text"></div>`;
    cdiv.querySelector(".comment-text").textContent=c.text;
    if(state.isAdmin){
      const cbtn=document.createElement("button");
      cbtn.className="btn";
      cbtn.textContent="Delete Comment";
      cbtn.onclick=async()=>{
        setStatus("");
        const ok=await apiPost("admin_delete_comment",{token:state.token,postId:post.id,commentId:c.id});
        if(!ok){setStatus("admin delete failed");return}
        await fetchPost(post.id);
      };
      cdiv.appendChild(cbtn);
    }
    cwrap.appendChild(cdiv);
  });
  if(state.sessionUser){
    const form=document.createElement("div");
    form.className="comment";
    const inp=document.createElement("input");
    inp.className="input";
    inp.placeholder="comment";
    const btn=document.createElement("button");
    btn.className="btn";
    btn.textContent="Post Comment";
    btn.onclick=async()=>{
      const text=inp.value.trim();
      if(!text)return;
      setStatus("");
      const ok=await apiPost("comment",{token:state.token,postId:post.id,text});
      if(!ok){setStatus("comment failed");return}
      await fetchPost(post.id);
    };
    form.append(inp,btn);
    cwrap.appendChild(form);
  }
  body.appendChild(cwrap);
  panel.append(head,body);
  wrap.classList.remove("hidden");
  wrap.appendChild(panel);
}
function renderList(){
  const list=qs("#posts");
  list.innerHTML="";
  const sorted=[...state.posts].sort((a,b)=>b.ts-a.ts);
  const totalPages=Math.max(1,Math.ceil(sorted.length/PAGE_SIZE));
  if(state.page>totalPages)state.page=totalPages;
  const start=(state.page-1)*PAGE_SIZE;
  const pageItems=sorted.slice(start,start+PAGE_SIZE);
  pageItems.forEach(p=>{
    const wrap=document.createElement("div");
    wrap.className="post";
    const head=document.createElement("div");
    head.className="post-head";
    const safeTitle=p.title||"(untitled)";
    head.innerHTML=`<div class="post-title"><a class="post-link" href="/post/?id=${encodeURIComponent(p.id)}">${safeTitle}</a></div><div class="post-meta">by ${p.user} • ${fmtTime(p.ts)}</div>`;
    const body=document.createElement("div");
    body.className="post-body";
    const media=document.createElement(p.type==="video"?"video":"img");
    media.className="post-media";
    media.src=p.url;
    if(p.type==="video"){media.controls=true;media.preload="metadata"}else{media.loading="lazy";media.decoding="async"}
    body.appendChild(media);
    const votes=document.createElement("div");
    votes.className="vote-bar";
    votes.innerHTML=`<span class="vote-btn"><span class="vote-icon">👍</span><span class="vote-count">${Number(p.likes||0)}</span></span><span class="vote-btn"><span class="vote-icon">👎</span><span class="vote-count">${Number(p.dislikes||0)}</span></span>`;
    body.appendChild(votes);
    wrap.append(head,body);
    list.appendChild(wrap);
  });
  renderPager(totalPages);
}
function renderPager(totalPages){
  const pager=qs("#pager");
  if(!pager)return;
  pager.innerHTML="";
  if(totalPages<=1)return;
  const addBtn=(label,page,disabled=false,current=false)=>{
    const btn=document.createElement("button");
    btn.className="btn";
    btn.textContent=label;
    if(disabled)btn.disabled=true;
    if(current)btn.setAttribute("aria-current","page");
    btn.onclick=()=>{
      if(disabled||page===state.page)return;
      state.page=page;
      renderList();
    };
    pager.appendChild(btn);
  };
  addBtn("←",Math.max(1,state.page-1),state.page<=1);
  const pages=[];
  if(totalPages<=7){
    for(let i=1;i<=totalPages;i++)pages.push(i);
  }else{
    pages.push(1);
    let start=Math.max(2,state.page-1);
    let end=Math.min(totalPages-1,state.page+1);
    if(start>2)pages.push("…");
    for(let i=start;i<=end;i++)pages.push(i);
    if(end<totalPages-1)pages.push("…");
    pages.push(totalPages);
  }
  pages.forEach(p=>{
    if(p==="…"){
      const span=document.createElement("span");
      span.className="muted";
      span.textContent="…";
      pager.appendChild(span);
      return;
    }
    addBtn(String(p),p,false,p===state.page);
  });
  addBtn("→",Math.min(totalPages,state.page+1),state.page>=totalPages);
}
async function fetchPosts(){
  const data=await apiGet("posts");
  state.posts=Array.isArray(data?.posts)?data.posts:[];
  state.page=1;
  renderList();
}
async function fetchPost(id){
  if(String(id)==="0"){
    state.post=null;
    const wrap=qs("#post-view");
    wrap.classList.remove("hidden");
    wrap.innerHTML=`<video src="/caw-content/brooky.mp4" controls autoplay style="position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000;z-index:9999"></video>`;
    return;
  }
  const data=await apiGet("post",{id});
  state.post=data?.post||null;
  renderPost();
}
async function init(){
  if(CAW_BOARD_CLOSED){
    qs("#post-view").classList.remove("hidden");
    qs("#post-list").classList.add("hidden");
    qs("#post-view").innerHTML=`<div class="panel"><div class="muted">Caw-board is currently closed.</div></div>`;
    setStatus("caw-board closed");
    return;
  }
  loadState();
  await refreshSession();
  if(postId){
    qs("#post-view").classList.remove("hidden");
    qs("#post-list").classList.add("hidden");
    await fetchPost(postId);
  }else{
    qs("#post-list").classList.remove("hidden");
    qs("#post-view").classList.add("hidden");
    await fetchPosts();
  }
}
qs("#logout-btn").onclick=()=>{
  setToken("");
  state.sessionUser=null;
  state.isAdmin=false;
  renderAuth();
};
init();
</script>
</body></html>
